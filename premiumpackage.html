            <ul>
                <li><a href="about.html">نبذة عنا</a></li>

       <div class="logo">
            <a href="home.html"> <img src="images/iconweb2.png" alt="Loving Homes Logo" , title="Loving Homes Logo"></a>

    <section class="booking-page-wrapper">
    <div class="booking-flat-card">
        <h2 class="form-title">نموذج حجز - الحزمة المميزة</h2>

        <form action="#" method="post" class="booking-form">
            
            <div class="form-group-title">معلومات صاحب الحيوان</div>
            <div class="input-row">
                <label>الاسم الكامل:</label>
                <input type="text" name="owner-name" required placeholder="__________________________">
            </div>
            <div class="input-row">
                <label>رقم الهاتف:</label>
                <input type="tel" name="phone" required placeholder="__________________________">
            </div>
            <div class="input-row">
                <label>البريد الإلكتروني:</label>
                <input type="email" name="email" required placeholder="__________________________">
            </div>

            <div class="form-group-title">معلومات الحيوان الأليف</div>
            <div class="input-row">
                <label>اسم الحيوان:</label>
                <input type="text" name="pet-name" required placeholder="__________________________">
            </div>
            <div class="input-row">
                <label>النوع / السلالة:</label>
                <input type="text" name="breed" required placeholder="__________________________">
            </div>
            <div class="input-row">
                <label>العمر:</label>
                <input type="text" name="age" placeholder="__________________________">
            </div>
            <div class="input-row">
                <label>الحالة الصحية / ملاحظات خاصة:</label>
                <input type="text" name="health" placeholder="____________________________________________________">
            </div>

            <div class="form-group-title">تفاصيل الإقامة</div>
            <div class="input-row">
                <label>تاريخ الوصول:</label>
                <input type="text" name="arrival" placeholder="____ / ____ / ________">
            </div>
            <div class="input-row">
                <label>تاريخ المغادرة:</label>
                <input type="text" name="departure" placeholder="____ / ____ / ________">
            </div>

            <div class="checkbox-options">
                <p>هل ترغب بتحديثات يومية وصور؟ 
                    <label><input type="radio" name="updates" value="yes"> نعم</label>
                    <label><input type="radio" name="updates" value="no"> لا</label>
                </p>
                <p>هل توجد مكافآت خاصة متفق عليها؟ 
                    <label><input type="radio" name="treats" value="yes"> نعم</label>
                    <label><input type="radio" name="treats" value="no"> لا</label>
                </p>
            </div>

            <div class="input-row">
                <label>تفاصيل إضافية:</label>
                <input type="text" name="extra" placeholder="____________________________________________________">
            </div>

           <div class="terms-check">
    <label><input type="checkbox" id="terms" required> أوافق على الشروط والأحكام</label>
</div>

<button type="submit" id="bookingBtn" class="booking-btn" disabled>احجز الآن</button>
        </form>
    </div>
</section>



    <script src="script.js"></script>


</body>
</html>
