<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
<meta name="description" content="Loving Homes - رعاية وإقامة الحيوانات الأليفة">
<meta name="theme-color" content="#0059BD">
    <title>Loving Homes |  حجز الحزمة اليوم </title>
    <link rel="stylesheet" href="style.css">
        <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">

</head>
<body>

    <header>
        <nav>
            <ul>
                <li><a href="about.html">نبذة عنا</a></li>
                <li><a href="help.html" >المساعدة والمشورة</a></li>
                <li><a href="packages.html" class="active">الحزم المقدمة</a></li>
                <li><a href="facilities.html">المرافق المقدمة</a></li>
                <li><a href="home.html">الرئيسية</a></li>
            </ul>
        </nav>
        <div class="logo">
            <a href="home.html"> <img src="images/iconweb2.png" alt="Loving Homes Logo" , title="Loving Homes Logo"></a>
           
        </div>
    </header>

    <main class="booking-page-wrapper">
        <div class="booking-flat-card">
            <h2 class="form-title-day">نموذج حجز - الحزمة اليومية</h2>

            <form action="#" class="booking-form" id="dayBookingForm">
                
                <div class="form-group-title">معلومات صاحب الحيوان</div>
                <div class="input-row">
                    <label>الاسم الكامل:</label>
                    <input type="text" name="owner-name" required placeholder="__________________________">
                </div>
                <div class="input-row">
                    <label>رقم الهاتف:</label>
                    <input type="tel" name="phone" required placeholder="__________________________">
                </div>
                <div class="input-row">
                    <label>البريد الإلكتروني:</label>
                    <input type="email" name="email" required placeholder="__________________________">
                </div>

                <div class="form-group-title">معلومات الحيوان الأليف</div>
                <div class="input-row">
                    <label>اسم الحيوان:</label>
                    <input type="text" name="pet-name" required placeholder="__________________________">
                </div>
                <div class="input-row">
                    <label>النوع:</label>
                    <input type="text" name="type" required placeholder="__________________________">
                </div>
                <div class="input-row">
                    <label>العمر:</label>
                    <input type="text" name="age" placeholder="__________________________">
                </div>

                <div class="form-group-title">تفاصيل الحجز</div>
                <div class="input-row">
                    <label>تاريخ الحجز:</label>
                    <input type="text" name="date" placeholder="____ / ____ / ________">
                </div>
                <div class="input-row">
                    <label>وقت الوصول:</label>
                    <input type="text" name="arrival-time" placeholder="__________________________">
                </div>
                <div class="input-row">
                    <label>وقت الاستلام:</label>
                    <input type="text" name="pickup-time" placeholder="__________________________">
                </div>

                <div class="checkbox-options">
                    <p>هل يحتاج الحيوان إلى عناية خاصة؟ 
                        <label><input type="radio" name="special-care" value="yes"> نعم</label>
                        <label><input type="radio" name="special-care" value="no"> لا</label>
                    </p>
                </div>

                <div class="input-row">
                    <label>إذا نعم، يرجى التوضيح:</label>
                    <input type="text" name="care-details" placeholder="____________________________________________________">
                </div>

           <div class="terms-check">
    <label><input type="checkbox" id="terms" required> أوافق على الشروط والأحكام</label>
</div>

<button type="submit" id="bookingBtn" class="booking-btn" disabled>احجز الآن</button>
            </form>
        </div>
    </main>

        <script src="script.js"></script>

</body>
</html>
